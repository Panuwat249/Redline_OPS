<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Dashboard รถไฟฟ้า</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h1>ระบบรถไฟฟ้าสายสีแดง</h1>
  <p id="date"></p>
</header>

<div class="container">

  <!-- row 1 -->
  <div class="grid-3">
    <div class="card red">
      <h3>สายเหนือ</h3>
      <div class="percent">100%</div>
    </div>

    <div class="card lightred">
      <h3>สายตะวันตก</h3>
      <div class="percent">100%</div>
    </div>

    <div class="card gray">
      <h3>ทั้งสองสาย</h3>
      <div class="percent">100%</div>
    </div>
  </div>

  <!-- row 2 -->
  <div class="grid-3">
    <div class="card">
      <h3>ความน่าเชื่อถือ</h3>
      <div class="percent">100%</div>
    </div>

    <div class="card">
      <h3>ความพร้อมขบวนรถ</h3>
      <div class="percent">100%</div>
    </div>

    <div class="card">
      <h3>การให้บริการ</h3>
      <div class="percent">100%</div>
    </div>
  </div>

  <!-- bottom -->
  <div class="grid-2">
    <div class="card big">
      <h3>ระยะทางที่วิ่ง (กม.)</h3>
      <div class="value">170,475</div>
    </div>

    <div class="card big">
      <h3>จำนวนเที่ยว</h3>
      <div class="value">8,819</div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
